<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ChatGPT Clone</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body class="dark">

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- NEW CHAT -->
    <button class="icon-btn"onclick="newChat()">
      <svg viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      <span class="tooltip">Đoạn Chát Mới</span>
    </button>

    <!-- SEARCH -->
    <button class="icon-btn">
      <svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"/>
        <line x1="16.5" y1="16.5" x2="21" y2="21"/>
      </svg>
      <span class="tooltip">Tìm Kiếm</span>
    </button>

    <!-- DARK / LIGHT -->
    <button class="icon-btn" onclick="toggleTheme()">
      <svg viewBox="0 0 24 24">
        <path d="M12 3a9 9 0 100 18 7 7 0 010-18z"/>
      </svg>
      <span class="tooltip">Tối/Sáng</span>
    </button>

  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header"></div>

    <div id="chat" class="chat"></div>

    <div class="input-wrap">

      <!-- PREVIEW -->
      

      <div class="input-box">
          
        <!-- UPLOAD -->
        <label class="icon-btn">
          <svg viewBox="0 0 24 24">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          <span class="tooltip">Thêm tệp</span>
          <input type="file" id="imgInput" multiple hidden>
        </label>
<div id="preview" class="preview"></div>
        <!-- INPUT -->
        <textarea id="input" rows="1" placeholder="Hỏi bất kỳ điều gì..."></textarea>

        <!-- MIC -->
        <button class="icon-btn" onclick="startVoice()">
          <svg viewBox="0 0 24 24">
            <rect x="9" y="3" width="6" height="12" rx="3"/>
            <path d="M5 11a7 7 0 0014 0"/>
            <line x1="12" y1="18" x2="12" y2="21"/>
          </svg>
          <span class="tooltip">Nói Để Nhập</span>
        </button>

        <!-- SEND -->
        <button id="sendBtn" class="send-btn">
  <svg viewBox="0 0 24 24">
    <path d="M12 4v14"/>
    <path d="M8 9l4-5 5 5"/>
  </svg>
  <span class="tooltip">Gửi</span>
</button>

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
